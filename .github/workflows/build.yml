name: Build OpenWrt packages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Static checks
        run: |
          node --check luci-app-ddns-go/htdocs/luci-static/resources/view/ddns-go/overview.js
          node --check luci-app-ddns-go/htdocs/luci-static/resources/view/ddns-go/log.js
          sh -n ddns-go/files/ddns-go.init
          sh -n luci-app-ddns-go/root/etc/uci-defaults/99-luci-ddns-go
          jq empty luci-app-ddns-go/root/usr/share/luci/menu.d/luci-app-ddns-go.json
          jq empty luci-app-ddns-go/root/usr/share/rpcd/acl.d/luci-app-ddns-go.json

  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            package_arch: x86_64
            target_config: |
              CONFIG_TARGET_x86=y
              CONFIG_TARGET_x86_64=y
          - target: qualcommax-ipq60xx
            package_arch: aarch64_cortex-a53
            target_config: |
              CONFIG_TARGET_qualcommax=y
              CONFIG_TARGET_qualcommax_ipq60xx=y
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget
      - name: Clone and update OpenWrt
        id: source
        run: |
          git clone --depth=1 --single-branch --branch owrt https://github.com/VIKINGYFY/immortalwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          {
            git rev-parse HEAD
            for feed in feeds/*; do
              git -C "$feed" rev-parse HEAD
            done
          } | sha256sum | cut -d ' ' -f 1 | xargs -I {} echo "fingerprint={}" >> "$GITHUB_OUTPUT"
      - name: Restore OpenWrt tools cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          key: openwrt-owrt-${{ matrix.target }}-${{ steps.source.outputs.fingerprint }}
          restore-keys: |
            openwrt-owrt-${{ matrix.target }}-
          path: |
            openwrt/.ccache
            openwrt/dl
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
      - name: Restore cached tool timestamps
        run: |
          if [ -d openwrt/staging_dir ]; then
            find openwrt/staging_dir -type d -name stamp -not -path '*target*' | while read -r dir; do
              find "$dir" -type f -exec touch {} +
            done
            mkdir -p openwrt/tmp
            echo 1 > openwrt/tmp/.build
          fi
      - name: Prepare OpenWrt packages
        run: |
          cd openwrt
          ./scripts/feeds install -a
          find feeds/luci feeds/packages package/feeds -maxdepth 4 \
            \( -type d -o -type l \) \
            \( -name ddns-go -o -name luci-app-ddns-go \) \
            -prune -exec rm -rf {} +
          mkdir -p package/ddns-go-suite
          cp -a "$GITHUB_WORKSPACE/ddns-go" package/ddns-go-suite/ddns-go
          cp -a "$GITHUB_WORKSPACE/luci-app-ddns-go" package/ddns-go-suite/luci-app-ddns-go
          cat > .config <<'EOF'
          ${{ matrix.target_config }}
          CONFIG_PACKAGE_ddns-go=m
          CONFIG_PACKAGE_luci-app-ddns-go=m
          EOF
          make defconfig
          grep -E '^CONFIG_PACKAGE_(luci-app-)?ddns-go=[my]$' .config
          grep -Eq '^CONFIG_PACKAGE_ddns-go=[my]$' .config
          grep -Eq '^CONFIG_PACKAGE_luci-app-ddns-go=[my]$' .config
      - name: Download sources
        working-directory: openwrt
        run: make download -j8
      - name: Build host tools
        if: steps.cache.outputs.cache-matched-key == ''
        working-directory: openwrt
        run: make tools/install -j"$(nproc)"
      - name: Build toolchain
        if: steps.cache.outputs.cache-matched-key == ''
        working-directory: openwrt
        run: make toolchain/install -j"$(nproc)"
      - name: Save OpenWrt tools cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: ${{ steps.cache.outputs.cache-primary-key }}
          path: |
            openwrt/.ccache
            openwrt/dl
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
      - name: Compile packages
        working-directory: openwrt
        run: |
          make package/ddns-go-suite/ddns-go/compile -j"$(nproc)" V=s
          make package/ddns-go-suite/luci-app-ddns-go/compile -j"$(nproc)" V=s
      - name: Verify package versions
        run: |
          find "openwrt/bin/packages/${{ matrix.package_arch }}" -type f -name 'ddns-go-6.17.1.1-r1.apk' | grep -q .
          find openwrt/bin/packages -type f -name 'luci-app-ddns-go-*.apk' | grep -q .
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ddns-go-openwrt-packages-${{ matrix.target }}
          path: |
            openwrt/bin/packages/**/*ddns-go*.apk
            openwrt/bin/packages/**/*ddns-go*.ipk
          if-no-files-found: error
